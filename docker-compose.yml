version: '3.8'

services:

  msr-db:
    container_name: msr-db-2
    image: postgres:13-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my-shows-rating"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  msr-backend:
    container_name: msr-backend
    image: gitlab.qa.studio:5050/manual-qa/my-shows-rating/backend:v1.0.0
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      msr-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/api/v1/series"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

# Сервис api-tests

  api-tests:
    container_name: api_tests

  # Способ сборки образа
    build:
      context: .
      dockerfile: Dockerfile

  # Зависимость от msr-backend с ожиданием healthcheck
    depends_on:
      msr-backend:
        condition: service_healthy

  # Environment с переменными для подключения к API и БД
    environment:
      MY_SHOWS_HOST: http://msr-backend:8000/api/v1
      MY_SHOWS_POSTGRES_DB: my-shows-rating
      MY_SHOWS_POSTGRES_USER: postgres
      MY_SHOWS_POSTGRES_PASSWORD: "123456"
      MY_SHOWS_POSTGRES_HOST: msr-db
      MY_SHOWS_POSTGRES_PORT: "5432"
    volumes:
      - ./allure-results:/app/allure-results
    command: ["pytest", "-v", "--alluredir=/app/allure-results"]
    networks:
      - test-network

  # Подключение к сети
networks:
  test-network:
    driver: bridge
